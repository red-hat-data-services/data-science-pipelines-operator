name: Chaos Validation
on:
  push:
    branches:
      - main
      - stable
  pull_request:
    paths:
      - '**'
      - '!**/*.md'
      - '!.gitleaks.toml'
      - '!.gitignore'
      - '!.pre-commit-config.yaml'
      - '!.yamllint.yaml'
      - '!LICENSE'
      - '!OWNERS'
concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.run_id }}
  cancel-in-progress: true
permissions:
  contents: read

jobs:
  chaos-validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
        with:
          fetch-depth: 0

      - name: Setup Go
        uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff  # v5.6.0
        with:
          go-version-file: go.mod

      - name: Ensure envsubst is available
        run: command -v envsubst >/dev/null || { sudo apt-get update -qq && sudo apt-get install -y -qq gettext-base; }

      - name: Validate chaos knowledge and experiments
        run: make chaos-validate

      - name: Detect breaking changes
        if: github.event_name == 'pull_request'
        env:
          BASE_REF: ${{ github.base_ref }}
        run: |
          if ! git show "origin/${BASE_REF}:chaos/knowledge/dspo-default.yaml" > /tmp/base-knowledge.yaml 2>/dev/null; then
            echo "No base knowledge file found on target branch, skipping diff"
            exit 0
          fi
          go tool operator-chaos diff \
            --source /tmp/base-knowledge.yaml \
            --target chaos/knowledge/dspo-default.yaml \
            --breaking

      - name: Run chaos SDK tests
        run: make test-chaos
