apiVersion: chaos.operatorchaos.io/v1alpha1
kind: ChaosExperiment
metadata:
  name: dspo-minio-network-partition
  namespace: ${DSPA_NAMESPACE}
spec:
  tier: 2
  target:
    operator: data-science-pipelines-operator
    component: minio
    resource: Deployment/minio-${DSPA_NAME}

  steadyState:
    checks:
      - type: conditionTrue
        apiVersion: apps/v1
        kind: Deployment
        name: minio-${DSPA_NAME}
        namespace: ${DSPA_NAMESPACE}
        conditionType: Available
      - type: conditionTrue
        apiVersion: datasciencepipelinesapplications.opendatahub.io/v1
        kind: DataSciencePipelinesApplication
        name: ${DSPA_NAME}
        namespace: ${DSPA_NAMESPACE}
        conditionType: ObjectStoreAvailable
    timeout: 30s

  injection:
    type: NetworkPartition
    parameters:
      labelSelector: "app=minio-${DSPA_NAME},component=data-science-pipelines"
    ttl: 30s

  hypothesis:
    description: >
      Cascading failure: When Minio is network-partitioned, the APIServer
      loses object store connectivity. The operator health check reports
      ObjectStoreAvailable=False. After the partition heals, the health
      check passes on the next reconcile cycle and all conditions restore
      to True.
    recoveryTimeout: 60s

  blastRadius:
    maxPodsAffected: 1
    allowedNamespaces:
      - ${DSPA_NAMESPACE}
