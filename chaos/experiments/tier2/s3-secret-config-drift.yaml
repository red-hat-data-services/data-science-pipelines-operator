apiVersion: chaos.operatorchaos.io/v1alpha1
kind: ChaosExperiment
metadata:
  name: dspo-s3-secret-config-drift
spec:
  tier: 2
  target:
    operator: data-science-pipelines-operator
    component: minio
    resource: Secret/ds-pipeline-s3-${DSPA_NAME}

  steadyState:
    checks:
      - type: conditionTrue
        apiVersion: datasciencepipelinesapplications.opendatahub.io/v1
        kind: DataSciencePipelinesApplication
        name: ${DSPA_NAME}
        namespace: ${DSPA_NAMESPACE}
        conditionType: ObjectStoreAvailable
      - type: resourceExists
        apiVersion: v1
        kind: Secret
        name: ds-pipeline-s3-${DSPA_NAME}
        namespace: ${DSPA_NAMESPACE}
    timeout: 30s

  injection:
    type: ConfigDrift
    parameters:
      resourceType: Secret
      name: ds-pipeline-s3-${DSPA_NAME}
      namespace: ${DSPA_NAMESPACE}
      key: chaos-injected
      value: "true"
    ttl: 30s
    dangerLevel: high

  # Stability test: the chaos operator injects an extra key and removes it
  # after the TTL. DSPO uses manifestival's strategic merge patch which does
  # not remove extra keys, so this validates that the S3 secret tolerates the
  # extra key during the injection window, not that DSPO corrects the drift.
  hypothesis:
    description: >
      When the S3 credentials secret is mutated with an extra key,
      ObjectStoreAvailable remains True because the actual credential keys
      (accesskey/secretkey) are not modified and the extra key does not
      affect object store connectivity.
    recoveryTimeout: 60s

  blastRadius:
    maxPodsAffected: 1
    allowDangerous: true
    allowedNamespaces:
      - ${DSPA_NAMESPACE}
